<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeustoSport - Registro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4f8c8a 0%, #243f56 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
            width: 100%;
            max-width: 520px;
            padding: 28px;
        }

        h1 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 11px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            background: linear-gradient(135deg, #0f766e 0%, #115e59 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }

        .response {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            white-space: pre-line;
        }

        .response.success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .response.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .footer-link {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .footer-link a {
            color: #0f766e;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Crear Cuenta</h1>
    <p class="subtitle">Registra tus datos para empezar a reservar pistas.</p>

    <form id="registroForm">
        <div class="form-group">
            <label for="nombreCompleto">Nombre completo</label>
            <input type="text" id="nombreCompleto" placeholder="Ej: Juan Garcia" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Ej: juan@email.com" required>
        </div>

        <div class="form-group">
            <label for="dni">DNI</label>
            <input type="text" id="dni" placeholder="Ej: 12345678A" required>
        </div>

        <div class="form-group">
            <label for="telefono">Telefono (opcional)</label>
            <input type="text" id="telefono" placeholder="Ej: 666111222">
        </div>

        <div class="form-group">
            <label for="password">Contrasena</label>
            <input type="password" id="password" placeholder="Minimo 8 caracteres" required>
        </div>

        <button type="submit">Registrarme</button>
    </form>

    <div id="response" class="response"></div>

    <p class="footer-link">
        Ya tienes cuenta? <a href="/index.html">Inicia sesión</a>
    </p>
</div>

<script>
    const form = document.getElementById("registroForm");
    const responseDiv = document.getElementById("response");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            nombreCompleto: document.getElementById("nombreCompleto").value,
            email: document.getElementById("email").value,
            dni: document.getElementById("dni").value,
            telefono: document.getElementById("telefono").value,
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("/api/auth/registro", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.exitoso) {
                responseDiv.className = "response success";
                responseDiv.textContent = "Cuenta creada correctamente. Ya puedes iniciar sesion.";
                form.reset();
                setTimeout(() => {
                    window.location.href = "/";
                }, 2000);
                return;
            }

            let errorMessage = data.mensaje || "No se pudo completar el registro.";
            if (!data.mensaje && data.errors && Array.isArray(data.errors)) {
                errorMessage = data.errors.join("\n");
            }

            responseDiv.className = "response error";
            responseDiv.textContent = errorMessage;
        } catch (error) {
            responseDiv.className = "response error";
            responseDiv.textContent = "Error de conexion: " + error.message;
        }
    });
</script>
</body>
</html>
