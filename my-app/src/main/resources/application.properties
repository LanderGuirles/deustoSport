spring.application.name=my-app
spring.datasource.url=${DB_URL:jdbc:h2:file:./deustosport_app;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=8080

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Email Configuration (Recuperación de Contraseña)
# Por defecto deshabilitado (usa simulación en consola)
# Para habilitar email real, configura las propiedades y establece app.email.enabled=true
app.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Pasarela de pago externa (desactivada por defecto)
payment.gateway.enabled=${PAYMENT_GATEWAY_ENABLED:false}
payment.gateway.base-url=${PAYMENT_GATEWAY_BASE_URL:http://localhost:9090}
payment.gateway.validate-path=${PAYMENT_GATEWAY_VALIDATE_PATH:/api/payments/validate}
payment.gateway.api-key=${PAYMENT_GATEWAY_API_KEY:}