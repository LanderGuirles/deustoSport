spring.application.name=my-app
spring.datasource.url=${DB_URL:jdbc:h2:mem:deustosport_app;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
server.port=8080

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Pasarela de pago externa (activar en entornos con API real)
payment.gateway.enabled=${PAYMENT_GATEWAY_ENABLED:false}
payment.gateway.base-url=${PAYMENT_GATEWAY_BASE_URL:http://localhost:9090}
payment.gateway.validate-path=${PAYMENT_GATEWAY_VALIDATE_PATH:/api/payments/validate}
payment.gateway.api-key=${PAYMENT_GATEWAY_API_KEY:}
