<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Secretaria - Busqueda de Usuarios</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --ink: #1d2939;
            --muted: #667085;
            --brand: #0b7a75;
            --brand-soft: #dff3f1;
            --danger: #b42318;
            --line: #e4e7ec;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 0% 0%, #edf8f7 0%, var(--bg) 48%);
            color: var(--ink);
        }

        .layout {
            max-width: 1100px;
            margin: 36px auto;
            padding: 0 16px;
        }

        .header {
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 0.3px;
        }

        .subtitle {
            margin-top: 8px;
            color: var(--muted);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        .btn-secondary {
            background: var(--brand-soft);
            color: #065f5b;
        }

        .status {
            margin-top: 12px;
            font-size: 14px;
            color: var(--muted);
            min-height: 20px;
        }

        .status.error {
            color: var(--danger);
        }

        .grid {
            margin-top: 20px;
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th,
        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
            vertical-align: top;
        }

        th {
            background: #f8fafc;
            color: #344054;
            font-weight: 700;
        }

        .reserva-box {
            margin-top: 18px;
            border-top: 1px dashed var(--line);
            padding-top: 16px;
        }

        .tag {
            font-weight: 700;
            color: #344054;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 24px;
            }

            .card {
                padding: 16px;
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="header">
        <h1>Panel de Secretaria</h1>
        <p class="subtitle">Busca usuarios por DNI y consulta sus reservas de forma rapida.</p>
    </div>

    <section class="card">
        <div class="filters">
            <div class="field">
                <label for="dni">Filtrar por DNI</label>
                <input id="dni" type="text" placeholder="Ej: 11111111A">
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="buscarBtn">Buscar</button>
            <button class="btn-secondary" id="limpiarBtn">Limpiar filtros</button>
        </div>

        <div class="status" id="status"></div>

        <div class="grid">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>DNI</th>
                    <th>Email</th>
                    <th>Telefono</th>
                    <th>Reservas</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="usuariosBody">
                <tr><td colspan="7">Introduce un filtro y pulsa "Buscar".</td></tr>
                </tbody>
            </table>
        </div>

        <div class="reserva-box" id="reservasBox" style="display:none;">
            <p><span class="tag">Reservas del usuario:</span> <span id="usuarioReservaLabel"></span></p>
            <div class="grid">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha</th>
                        <th>Hora Inicio</th>
                        <th>Hora Fin</th>
                        <th>Estado</th>
                        <th>Pista</th>
                    </tr>
                    </thead>
                    <tbody id="reservasBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<script>
    const statusEl = document.getElementById("status");
    const usuariosBody = document.getElementById("usuariosBody");
    const reservasBody = document.getElementById("reservasBody");
    const reservasBox = document.getElementById("reservasBox");
    const usuarioReservaLabel = document.getElementById("usuarioReservaLabel");

    function setStatus(text, isError = false) {
        statusEl.textContent = text || "";
        statusEl.classList.toggle("error", Boolean(isError));
    }

    function buildSearchQuery() {
        const dni = document.getElementById("dni").value.trim();
        const params = new URLSearchParams();

        if (dni) {
            params.append("dni", dni);
        }
        return params.toString();
    }

    async function buscarUsuarios() {
        setStatus("Buscando usuarios...");
        reservasBox.style.display = "none";
        const query = buildSearchQuery();

        try {
            const response = await fetch(`http://localhost:8080/api/secretaria/usuarios${query ? `?${query}` : ""}`);
            if (!response.ok) {
                throw new Error("No se pudo obtener la lista de usuarios.");
            }

            const data = await response.json();
            renderUsuarios(data);
            setStatus(`Se encontraron ${data.length} usuario(s).`);
        } catch (error) {
            renderUsuarios([]);
            setStatus(error.message, true);
        }
    }

    function renderUsuarios(usuarios) {
        if (!usuarios.length) {
            usuariosBody.innerHTML = '<tr><td colspan="7">No hay usuarios que coincidan con los filtros.</td></tr>';
            return;
        }

        usuariosBody.innerHTML = usuarios.map((usuario) => `
            <tr>
                <td>${usuario.id}</td>
                <td>${usuario.nombreCompleto ?? "-"}</td>
                <td>${usuario.dni ?? "-"}</td>
                <td>${usuario.email ?? "-"}</td>
                <td>${usuario.telefono ?? "-"}</td>
                <td>${usuario.totalReservas}</td>
                <td>
                    <button class="btn-secondary" onclick="verReservas(${usuario.id}, '${(usuario.nombreCompleto || '').replace(/'/g, "\\'")}')">
                        Ver reservas
                    </button>
                </td>
            </tr>
        `).join("");
    }

    async function verReservas(usuarioId, nombreCompleto) {
        setStatus("Consultando reservas del usuario...");
        try {
            const response = await fetch(`http://localhost:8080/api/secretaria/usuarios/${usuarioId}/reservas`);
            if (!response.ok) {
                throw new Error("No se pudieron cargar las reservas.");
            }

            const data = await response.json();
            usuarioReservaLabel.textContent = `${nombreCompleto} (ID ${usuarioId})`;
            reservasBox.style.display = "block";
            renderReservas(data);
            setStatus(`Reservas cargadas: ${data.length}.`);
        } catch (error) {
            reservasBox.style.display = "none";
            setStatus(error.message, true);
        }
    }

    function renderReservas(reservas) {
        if (!reservas.length) {
            reservasBody.innerHTML = '<tr><td colspan="6">Este usuario no tiene reservas.</td></tr>';
            return;
        }

        reservasBody.innerHTML = reservas.map((reserva) => `
            <tr>
                <td>${reserva.id}</td>
                <td>${reserva.fecha}</td>
                <td>${reserva.horaInicio}</td>
                <td>${reserva.horaFin}</td>
                <td>${reserva.estado}</td>
                <td>${reserva.pistaNombre}</td>
            </tr>
        `).join("");
    }

    document.getElementById("buscarBtn").addEventListener("click", buscarUsuarios);

    document.getElementById("limpiarBtn").addEventListener("click", () => {
        document.getElementById("dni").value = "";
        usuariosBody.innerHTML = '<tr><td colspan="7">Introduce un filtro y pulsa "Buscar".</td></tr>';
        reservasBox.style.display = "none";
        setStatus("");
    });

    window.verReservas = verReservas;
</script>
</body>
</html>
