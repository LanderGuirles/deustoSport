<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeustoSport - Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* Estilos base extraídos de tu código original */
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --accent: #00e5a0; --accent2: #00b37e; --text: #e6edf3; --muted: #7d8590; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    /* Navbar pública */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); background: rgba(13,17,23,0.95); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent); }
    .logo span { color: var(--text); }
    .nav-actions { display: flex; gap: 12px; }
    
    /* Botones */
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all .2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); color: #0d1117; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn-primary:hover { background: var(--accent2); }

    /* Hero de bienvenida */
    .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 48px 32px; background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0,229,160,0.06) 0%, transparent 70%); }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; margin-bottom: 16px; }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { color: var(--muted); font-size: 18px; max-width: 500px; margin-bottom: 32px; line-height: 1.6; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Deusto<span>Sport</span></div>
    <div class="nav-actions">
      <button class="btn-ghost" onclick="window.location.href='login.html'">Iniciar Sesión</button>
      <button class="btn-primary" onclick="window.location.href='registro.html'">Registrarse</button>
    </div>
  </nav>

  <div class="hero">
    <h1>Reserva tu <em>pista</em> hoy mismo</h1>
    <p>Consulta tarifas, elige pista, horario y paga en segundos. Únete a la comunidad de DeustoSport y disfruta del mejor deporte.</p>
    <button class="btn-primary" style="padding: 14px 28px; font-size: 16px;" onclick="window.location.href='registro.html'">Empezar ahora</button>
  </div>

</body>
</html>
