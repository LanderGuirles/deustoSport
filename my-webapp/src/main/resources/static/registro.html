<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeustoSport - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --accent: #00e5a0;
            --accent2: #00b37e;
            --text: #e6edf3;
            --muted: #7d8590;
            --danger: #f85149;
            --success: #3fb950;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(13,17,23,0.95);
            position: sticky;
            top: 0;
            backdrop-filter: blur(8px);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--text); }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all .2s;
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .page {
            min-height: calc(100vh - 74px);
            display: grid;
            place-items: center;
            padding: 32px 20px;
            background: radial-gradient(ellipse 60% 40% at 50% 20%, rgba(0,229,160,0.08) 0%, transparent 70%);
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 30px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.35);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            text-align: center;
            font-size: 34px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 22px;
            line-height: 1.5;
        }

        .form-group { margin-bottom: 14px; }

        label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }

        input::placeholder { color: #5a6472; }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.15);
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: #0d1117;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
        }

        button[type="submit"]:hover { background: var(--accent2); }

        .response {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            display: none;
            white-space: pre-line;
            font-size: 14px;
        }

        .response.success {
            display: block;
            background: rgba(63, 185, 80, 0.12);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.35);
        }

        .response.error {
            display: block;
            background: rgba(248, 81, 73, 0.12);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.35);
        }

        .footer-link {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link a:hover { color: var(--accent2); }

        @media (max-width: 600px) {
            nav { padding: 14px 16px; }
            .container { padding: 22px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
<nav>
    <div class="logo">Deusto<span>Sport</span></div>
    <button class="btn-ghost" onclick="window.location.href='index.html'">Volver al inicio</button>
</nav>

<main class="page">
    <div class="container">
        <h1>Crear Cuenta</h1>
        <p class="subtitle">Registra tus datos para empezar a reservar pistas.</p>

        <form id="registroForm">
            <div class="form-group">
                <label for="nombreCompleto">Nombre completo</label>
                <input type="text" id="nombreCompleto" placeholder="Ej: Juan Garcia" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Ej: juan@email.com" required>
            </div>

            <div class="form-group">
                <label for="dni">DNI</label>
                <input type="text" id="dni" placeholder="Ej: 12345678A" required>
            </div>

            <div class="form-group">
                <label for="telefono">Telefono (opcional)</label>
                <input type="text" id="telefono" placeholder="Ej: 666111222">
            </div>

            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" placeholder="Minimo 8 caracteres" required>
            </div>

            <button type="submit">Registrarme</button>
        </form>

        <div id="response" class="response"></div>

        <p class="footer-link">
            Ya tienes cuenta? <a href="/index.html">Inicia sesion</a>
        </p>
    </div>
</main>

<script>
    const form = document.getElementById("registroForm");
    const responseDiv = document.getElementById("response");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            nombreCompleto: document.getElementById("nombreCompleto").value,
            email: document.getElementById("email").value,
            dni: document.getElementById("dni").value,
            telefono: document.getElementById("telefono").value,
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch("http://localhost:8080/api/auth/registro", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.exitoso) {
                responseDiv.className = "response success";
                responseDiv.textContent = "Cuenta creada correctamente. Ya puedes iniciar sesion.";
                form.reset();
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 2000);
                return;
            }

            let errorMessage = data.mensaje || "No se pudo completar el registro.";
            if (!data.mensaje && data.errors && Array.isArray(data.errors)) {
                errorMessage = data.errors.join("\n");
            }

            responseDiv.className = "response error";
            responseDiv.textContent = errorMessage;
        } catch (error) {
            responseDiv.className = "response error";
            responseDiv.textContent = "Error de conexion: " + error.message;
        }
    });
</script>
</body>
</html>
